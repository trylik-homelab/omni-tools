name: CI
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
jobs:
  test-and-build:
    runs-on: [self-hosted, homelab]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
      - name: Build project
        run: npm run build
  e2e-test:
    name: 'Playwright Tests'
    runs-on: [self-hosted, homelab]
    # Runs inside the official Playwright container (chromium + system deps
    # baked into the image), so no `install --with-deps` / sudo apt is needed
    # on the self-hosted runner.
    container:
      image: mcr.microsoft.com/playwright:v1.45.0-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      # Container job runs as root, so files it writes into the runner's
      # bind-mounted workspace are root-owned. Relax perms so a later
      # host-native job on the same self-hosted runner can clean them up at
      # checkout (avoids EACCES on actions/checkout).
      - name: Leave workspace cleanable by host-native jobs
        if: always()
        run: chmod -R a+rwX "$GITHUB_WORKSPACE" || true
  deploy:
    if: github.ref == 'refs/heads/main'
    needs:
      - test-and-build
      - e2e-test
    runs-on: [self-hosted, homelab]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v1.2
        with:
          publish-dir: ./dist
          production-branch: main
          deploy-message: ${{ github.event.head_commit.message }}
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 20
